<script>
// Initialize Supabase Client
const SUPABASE_URL = 'sb_publishable_ozY9047sDiIVmVgycB_yzA_kZgzodh6'; 
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvYmRydGVqYnd4bHN1YXFzYXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDI5NjEsImV4cCI6MjA5NTg3ODk2MX0.NmFWMNnZp6EauJdr2uLT2Yo46FfpzhJ0AzCiPNuxIyY'; 
const supabaseClient = supabase.createClient(sb_publishable_ozY9047sDiIVmVgycB_yzA_kZgzodh6, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvYmRydGVqYnd4bHN1YXFzYXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDI5NjEsImV4cCI6MjA5NTg3ODk2MX0.NmFWMNnZp6EauJdr2uLT2Yo46FfpzhJ0AzCiPNuxIyY);

let items = [];
let voted = {};
let activeFilter = 'all';
let sortMode = 'top';

// FETCH ITEMS FROM SUPABASE DATABASE
async function fetchItems() {
  const { data, error } = await supabaseClient
    .from('items')
    .select('*');

  if (!error && data) {
    items = data.map(i => ({
      id: i.id,
      name: i.name,
      brand: i.brand,
      cat: i.cat,
      desc: i.description,
      imgSrc: i.img_src,
      link: i.link,
      votes: i.votes,
      author: i.author
    }));
    renderFeed();
    renderTrending();
    updateStats();
  } else if (error) {
    console.error("Error fetching data:", error.message);
  }
}

function updateStats() {
  const totalVotes = items.reduce((s,i) => s + i.votes, 0);
  const cats = new Set(items.map(i => i.cat)).size;
  document.getElementById('stat-items').textContent = items.length;
  document.getElementById('stat-votes').textContent = totalVotes;
  document.getElementById('stat-cats').textContent = cats;
}

function renderFeed() {
  const list = document.getElementById('feed-list');
  let filtered = activeFilter === 'all' ? [...items] : items.filter(i => i.cat === activeFilter);
  if (sortMode === 'top') filtered.sort((a,b) => b.votes - a.votes);
  else filtered.sort((a,b) => b.id - a.id);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🌱</div>
      <h3>Nothing here yet</h3>
      <p>${activeFilter === 'all' ? 'Be the very first to submit a product built to last a lifetime.' : 'No items in this category yet. Be the first to add one!'}</p>
      <button class="btn-primary" onclick="openModal()">Submit the First Item</button>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(item => {
    const imgHtml = item.imgSrc
      ? `<img src="${item.imgSrc}" style="width:100%;height:100%;object-fit:cover;" alt="${item.name}">`
      : `<div class="card-img-placeholder"><span style="font-size:1.5rem;">📦</span><span>No photo</span></div>`;
    return `<div class="card">
      <div class="vote-col">
        <button class="vote-btn ${voted[item.id]==='up'?'voted':''}" onclick="vote(event,${item.id},'up')">▲</button>
        <span class="vote-count">${item.votes}</span>
        <button class="vote-btn ${voted[item.id]==='down'?'voted':''}" onclick="vote(event,${item.id},'down')">▼</button>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="cat-badge">${item.cat}</span>
          <span class="brand-badge">${item.brand}</span>
        </div>
        <div class="card-title">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-footer">
          <span class="card-author">Posted by ${item.author}</span>
          ${item.link ? `<a href="${item.link}" target="_blank" style="font-size:0.72rem;color:var(--rust);text-decoration:none;">Buy link ↗</a>` : ''}
        </div>
      </div>
      <div class="card-img">${imgHtml}</div>
    </div>`;
  }).join('');
}

function renderTrending() {
  const el = document.getElementById('trending-list');
  if (items.length === 0) { el.innerHTML = '<p class="trending-empty">No items yet — submit the first one!</p>'; return; }
  const top = [...items].sort((a,b) => b.votes - a.votes).slice(0,5);
  el.innerHTML = `<div class="trending-list">${top.map((item,i) => `
    <div class="trend-item">
      <span class="trend-rank">${i+1}</span>
      <div>
        <div class="trend-name">${item.name.split(' ').slice(0,4).join(' ')}</div>
        <div class="trend-votes">${item.votes} vote${item.votes !== 1 ? 's' : ''} · ${item.cat}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// PERSISTENT VOTING LOGIC WITH SUPABASE ROW UPDATES
async function vote(e, id, dir) {
  e.stopPropagation();
  const targetItem = items.find(i => i.id === id);
  if (!targetItem) return;

  let currentVoteState = voted[id];
  let modifier = 0;

  if (currentVoteState === dir) {
    modifier = dir === 'up' ? -1 : 1;
    voted[id] = null;
  } else {
    if (currentVoteState === 'up') modifier -= 1;
    if (currentVoteState === 'down') modifier += 1;
    modifier += dir === 'up' ? 1 : -1;
    voted[id] = dir;
  }

  const { error } = await supabaseClient
    .from('items')
    .update({ votes: targetItem.votes + modifier })
    .eq('id', id);

  if (!error) {
    fetchItems();
  } else {
    showToast('Could not register vote.');
  }
}

function filterCat(btn, cat) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = cat;
  renderFeed();
}

function setSort(btn, mode) {
  document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  sortMode = mode;
  renderFeed();
}

function previewImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('img-preview');
    prev.src = e.target.result;
    prev.style.display = 'block';
    document.querySelector('.img-upload-area .upload-icon').style.display = 'none';
    document.querySelector('.img-upload-area p').style.display = 'none';
    document.querySelector('.img-upload-area .upload-hint').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('f-name').value = '';
  document.getElementById('f-brand').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-link').value = '';
  document.getElementById('f-img').value = '';
  const prev = document.getElementById('img-preview');
  prev.src = ''; prev.style.display = 'none';
  document.querySelector('.img-upload-area .upload-icon').style.display = '';
  document.querySelector('.img-upload-area p').style.display = '';
  document.querySelector('.img-upload-area .upload-hint').style.display = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// SUBMIT DATA PERMANENTLY TO BACKEND
async function submitItem() {
  const name = document.getElementById('f-name').value.trim();
  const brand = document.getElementById('f-brand').value.trim();
  const cat = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  if (!name || !brand || !cat || !desc) { showToast('Please fill in all required fields.'); return; }

  const imgSrc = document.getElementById('img-preview').src || null;
  const link = document.getElementById('f-link').value.trim();

  const { data, error } = await supabaseClient
    .from('items')
    .insert([
      { 
        name: name, 
        brand: brand, 
        cat: cat, 
        description: desc, 
        img_src: imgSrc, 
        link: link || null, 
        votes: 1, 
        author: 'Community Member' 
      }
    ]);

  if (error) {
    showToast('Error uploading product to database.');
    console.error(error.message);
  } else {
    closeModal();
    fetchItems();
    showToast('Item submitted! Thanks for contributing.');
  }
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// Initial Load Hook
fetchItems();
</script>
