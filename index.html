<script>
    const SUPABASE_URL = 'https://tobdrtejbwxlsuaqsaqq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvYmRydGVqYnd4bHN1YXFzYXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDI5NjEsImV4cCI6MjA5NTg3ODk2MX0.NmFWMNnZp6EauJdr2uLT2Yo46FfpzhJ0AzCiPNuxIyY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let voted = {};
    let activeFilter = 'all';
    let sortMode = 'top';

    async function fetchItems() {
      const { data, error } = await supabaseClient.from('items').select('*');
      if (!error && data) {
        items = data.map(i => ({
          id: i.id, name: i.name, brand: i.brand, cat: i.cat,
          desc: i.description, imgSrc: i.img_src, link: i.link,
          votes: i.votes, author: i.author
        }));
        renderFeed();
        renderTrending();
        updateStats();
      } else if (error) {
        console.error("Data error:", error.message);
      }
    }

    function updateStats() {
      const totalVotes = items.reduce((s,i) => s + i.votes, 0);
      const cats = new Set(items.map(i => i.cat)).size;
      document.getElementById('stat-items').textContent = items.length;
      document.getElementById('stat-votes').textContent = totalVotes;
      document.getElementById('stat-cats').textContent = cats;
    }

    function renderFeed() {
      const list = document.getElementById('feed-list');
      let filtered = activeFilter === 'all' ? [...items] : items.filter(i => i.cat === activeFilter);
      if (sortMode === 'top') filtered.sort((a,b) => b.votes - a.votes);
      else filtered.sort((a,b) => b.id - a.id);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>Nothing here yet</h3><button class="btn-primary" onclick="openModal()">Submit the First Item</button></div>`;
        return;
      }

      list.innerHTML = filtered.map(item => {
        const imgHtml = item.imgSrc ? `<img src="${item.imgSrc}" style="width:100%;height:100%;object-fit:cover;">` : `<div class="card-img-placeholder">📦 No photo</div>`;
        const upVoted = voted[item.id] === 'up' ? 'voted' : '';
        const downVoted = voted[item.id] === 'down' ? 'voted' : '';
        
        return `<div class="card">
          <div class="vote-col">
            <button class="vote-btn ${upVoted}" onclick="vote(event, ${item.id}, 'up')">▲</button>
            <span class="vote-count">${item.votes}</span>
            <button class="vote-btn ${downVoted}" onclick="vote(event, ${item.id}, 'down')">▼</button>
          </div>
          <div class="card-body">
            <div class="card-meta"><span class="cat-badge">${item.cat}</span><span class="brand-badge">${item.brand}</span></div>
            <div class="card-title">${item.name}</div>
            <div class="card-desc">${item.desc}</div>
            <div class="card-footer"><span>Posted by ${item.author}</span></div>
          </div>
          <div class="card-img">${imgHtml}</div>
        </div>`;
      }).join('');
    }

    function renderTrending() {
      const el = document.getElementById('trending-list');
      if (items.length === 0) { el.innerHTML = '<p class="trending-empty">No items yet</p>'; return; }
      const top = [...items].sort((a,b) => b.votes - a.votes).slice(0,5);
      el.innerHTML = top.map((item,i) => `<div class="trend-item"><span class="trend-rank">${i+1}</span><div><div class="trend-name">${item.name}</div></div></div>`).join('');
    }

    async function vote(e, id, dir) {
      e.stopPropagation();
      const targetItem = items.find(i => i.id === id);
      if (!targetItem) return;
      let currentVoteState = voted[id];
      let modifier = 0;
      if (currentVoteState === dir) { modifier = dir === 'up' ? -1 : 1; voted[id] = null; }
      else { if (currentVoteState === 'up') modifier -= 1; if (currentVoteState === 'down') modifier += 1; modifier += dir === 'up' ? 1 : -1; voted[id] = dir; }
      const { error } = await supabaseClient.from('items').update({ votes: targetItem.votes + modifier }).eq('id', id);
      if (!error) fetchItems();
    }

    function filterCat(btn, cat) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = cat;
      renderFeed();
    }

    defineUiActions();
    function defineUiActions() {
      window.openModal = function() { document.getElementById('modal').classList.add('open'); };
      window.closeModal = function() { document.getElementById('modal').classList.remove('open'); };
      window.setSort = function(btn, mode) {
        document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        sortMode = mode;
        renderFeed();
      };
    }

    function previewImg(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const prev = document.getElementById('img-preview');
        prev.src = e.target.result; prev.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function submitItem() {
      const name = document.getElementById('f-name').value.trim();
      const brand = document.getElementById('f-brand').value.trim();
      const cat = document.getElementById('f-cat').value;
      const desc = document.getElementById('f-desc').value.trim();
      if (!name || !brand || !cat || !desc) { showToast('Please fill in all required fields.'); return; }
      const imgSrc = document.getElementById('img-preview').src || null;
      const link = document.getElementById('f-link').value.trim();

      const { error } = await supabaseClient.from('items').insert([{ name, brand, cat, description: desc, img_src: imgSrc, link: link || null, votes: 1, author: 'Community Member' }]);
      if (error) { showToast('Error uploading.'); } else { closeModal(); fetchItems(); showToast('Item submitted!'); }
    }

    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    fetchItems();
</script>
